<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ra inspector</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  :root {
    --bg: #0d1117; --bg2: #161b22; --bg3: #21262d; --border: #30363d;
    --text: #e6edf3; --text2: #8b949e; --accent: #58a6ff; --accent2: #3fb950;
    --red: #f85149; --orange: #d29922; --purple: #bc8cff;
    --font: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
    --radius: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; line-height: 1.6; }

  /* Layout */
  .app { display: grid; grid-template-columns: 320px 1fr; grid-template-rows: 52px 1fr; height: 100vh; }
  .app.no-sidebar { grid-template-columns: 1fr; }
  .app.no-sidebar .sidebar { display: none; }

  header { grid-column: 1 / -1; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 16px; }
  header h1 { font-size: 16px; font-weight: 600; color: var(--accent); flex-shrink: 0; }
  header select { font-size: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 5px 10px; font-family: var(--font); cursor: pointer; max-width: 220px; }
  header select:focus { border-color: var(--accent); outline: none; }
  .header-sep { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }
  .tab-group { display: flex; align-items: center; gap: 4px; }
  .tab { padding: 7px 16px; border-radius: 6px; cursor: pointer; color: var(--text2); transition: all 0.15s; font-size: 12px; }
  .tab:hover { background: var(--bg3); color: var(--text); }
  .tab.active { background: var(--accent); color: #fff; }

  #sub-tabs-container { position: sticky; top: 0; z-index: 10; }
  .sub-tabs { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 6px 24px; display: flex; gap: 4px; }
  .sub-tab { padding: 5px 14px; border-radius: 6px; cursor: pointer; color: var(--text2); font-size: 11px; transition: all 0.15s; }
  .sub-tab:hover { background: var(--bg3); color: var(--text); }
  .sub-tab.active { background: var(--bg3); color: var(--text); font-weight: 600; }

  .sidebar { background: var(--bg2); border-right: 1px solid var(--border); overflow-y: auto; }
  .main { overflow-y: auto; }
  #main-content { padding: 24px; }

  /* Sidebar */
  .sidebar-header { padding: 14px 16px 10px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text2); }
  .session-item .namespace { font-size: 10px; color: var(--purple); margin-bottom: 2px; }
  .session-item { padding: 12px 16px; cursor: pointer; border-left: 3px solid transparent; transition: all 0.1s; position: relative; }
  .session-item:hover { background: var(--bg3); }
  .session-item.active { background: var(--bg3); border-left-color: var(--accent); }
  .session-item .id { font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .session-item .meta { font-size: 11px; color: var(--text2); margin-top: 3px; }
  .session-item .delete-btn { position: absolute; top: 10px; right: 10px; display: none; background: none; border: none; color: var(--red); cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px; opacity: 0.6; }
  .session-item .delete-btn:hover { opacity: 1; background: rgba(248,81,73,0.15); }
  .session-item:hover .delete-btn { display: block; }
  .sidebar-actions { padding: 8px 16px; display: flex; gap: 6px; border-bottom: 1px solid var(--border); }
  .sidebar-actions button { font-size: 10px; padding: 4px 10px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); color: var(--text2); cursor: pointer; font-family: var(--font); }
  .sidebar-actions button:hover { background: var(--bg3); color: var(--text); }
  .sidebar-actions .btn-clear-all { color: var(--red); border-color: var(--red); opacity: 0.7; }
  .sidebar-actions .btn-clear-all:hover { opacity: 1; background: rgba(248,81,73,0.1); }
  .sidebar-actions .btn-auto-refresh { color: var(--text2); }
  .sidebar-actions .btn-auto-refresh.active { color: var(--accent2); border-color: var(--accent2); }

  /* Messages */
  .message { margin-bottom: 16px; border-radius: var(--radius); padding: 16px 20px; max-width: 100%; }
  .message.user { background: #1c2940; border: 1px solid #1f3a5f; }
  .message.assistant { background: var(--bg2); border: 1px solid var(--border); }
  .message.system { background: #1a1e2e; border: 1px solid #2d3555; }
  .message.tool { background: #1a2216; border: 1px solid #2a3d22; font-size: 12px; }
  .message .role { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; font-weight: 700; }
  .message.user .role { color: var(--accent); }
  .message.assistant .role { color: var(--accent2); }
  .message.system .role { color: var(--purple); }
  .message.tool .role { color: var(--orange); }
  .message .content { white-space: pre-wrap; word-break: break-word; line-height: 1.7; }
  .message .tool-calls { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .tool-call { background: var(--bg); border-radius: 8px; padding: 10px 14px; margin-top: 8px; font-size: 12px; }
  .tool-call .name { color: var(--orange); font-weight: 600; }
  .tool-call .args { color: var(--text2); margin-top: 6px; max-height: 200px; overflow-y: auto; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }

  /* Logs */
  .log-entry { display: grid; grid-template-columns: 180px 50px 1fr; gap: 12px; padding: 8px 14px; border-bottom: 1px solid var(--border); font-size: 12px; align-items: start; }
  .log-entry:hover { background: var(--bg2); }
  .log-ts { color: var(--text2); font-size: 11px; }
  .log-level { font-weight: 700; font-size: 11px; text-transform: uppercase; }
  .log-level.debug { color: var(--text2); }
  .log-level.info { color: var(--accent); }
  .log-level.warn { color: var(--orange); }
  .log-level.error { color: var(--red); }
  .log-msg { color: var(--text); }
  .log-data { color: var(--text2); font-size: 11px; margin-top: 4px; }

  /* Traces */
  .trace-entry { border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
  .trace-header { display: flex; align-items: center; gap: 14px; padding: 12px 16px; background: var(--bg2); cursor: pointer; }
  .trace-header:hover { background: var(--bg3); }
  .trace-name { font-weight: 600; color: var(--accent); }
  .trace-duration { color: var(--orange); font-size: 12px; }
  .trace-status { font-size: 11px; padding: 2px 10px; border-radius: 10px; font-weight: 600; }
  .trace-status.ok { background: #1a2e1a; color: var(--accent2); }
  .trace-status.error { background: #2e1a1a; color: var(--red); }
  .trace-attrs { padding: 12px 16px; font-size: 12px; display: none; }
  .trace-entry.open .trace-attrs { display: block; }
  .attr-row { display: flex; gap: 10px; padding: 3px 0; }
  .attr-key { color: var(--purple); min-width: 160px; }
  .attr-val { color: var(--text2); word-break: break-all; }

  /* Memory */
  .memory-toolbar { display: flex; gap: 8px; margin-bottom: 16px; align-items: stretch; }
  .memory-toolbar input { flex: 1; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; color: var(--text); font-family: var(--font); font-size: 13px; outline: none; }
  .memory-toolbar input:focus { border-color: var(--accent); }
  .memory-toolbar button { border: none; border-radius: 6px; padding: 8px 16px; cursor: pointer; font-family: var(--font); font-size: 12px; font-weight: 600; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-success { background: var(--accent2); color: #fff; }
  .btn-danger { background: var(--red); color: #fff; font-size: 11px; padding: 4px 10px; }
  .btn-danger:hover { opacity: 0.85; }
  .memory-form { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 20px; }
  .memory-form textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; color: var(--text); font-family: var(--font); font-size: 13px; outline: none; resize: vertical; min-height: 60px; }
  .memory-form textarea:focus { border-color: var(--accent); }
  .memory-form .form-row { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
  .memory-form .form-row input { flex: 1; }
  .memory-form label { font-size: 11px; color: var(--text2); margin-bottom: 4px; display: block; }
  .memory-item { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; margin-bottom: 10px; }
  .memory-item .memory-content { white-space: pre-wrap; word-break: break-word; }
  .memory-item .memory-meta { font-size: 11px; color: var(--text2); margin-top: 6px; display: flex; gap: 12px; align-items: center; }
  .memory-item .memory-tags { color: var(--purple); }
  .memory-item .memory-actions { margin-left: auto; }

  /* Config / Context / Middleware panels */
  .config-section { margin-bottom: 28px; }
  .config-section h2 { font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
  .config-block { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; white-space: pre-wrap; word-break: break-word; font-size: 12px; color: var(--text); overflow-x: auto; line-height: 1.6; }
  .context-file { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
  .context-file-header { padding: 12px 16px; background: var(--bg3); cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
  .context-file-header:hover { background: var(--border); }
  .context-file-path { color: var(--accent); font-weight: 600; font-size: 12px; }
  .context-file-body { padding: 12px 16px; font-size: 12px; white-space: pre-wrap; word-break: break-word; display: none; max-height: 500px; overflow-y: auto; }
  .context-file.open .context-file-body { display: block; }
  .mw-hook { margin-bottom: 12px; }
  .mw-hook-name { color: var(--orange); font-weight: 600; font-size: 12px; margin-bottom: 4px; }
  .mw-hook-entry { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; margin-bottom: 4px; font-size: 12px; color: var(--text2); }

  /* Session detail banner */
  .session-banner { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 20px; margin-bottom: 20px; display: flex; gap: 28px; flex-wrap: wrap; font-size: 12px; }
  .session-banner .sb-field { display: flex; flex-direction: column; gap: 2px; }
  .session-banner .sb-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text2); }
  .session-banner .sb-value { color: var(--text); font-weight: 600; }

  /* States */
  .empty { text-align: center; padding: 56px 20px; color: var(--text2); font-size: 13px; line-height: 1.8; }
  .badge { font-size: 10px; background: var(--bg3); color: var(--text2); padding: 2px 8px; border-radius: 10px; }
  .loading { text-align: center; padding: 40px; color: var(--text2); }

  /* Overview */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
  .stat-card .stat-value { font-size: 24px; font-weight: 700; color: var(--text); }
  .stat-card .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text2); margin-top: 4px; }
  .stat-card.error .stat-value { color: var(--red); }
  .stat-card.accent .stat-value { color: var(--accent); }
  .stat-card.green .stat-value { color: var(--accent2); }
  .stat-card.orange .stat-value { color: var(--orange); }

  .tool-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .tool-table th { text-align: left; padding: 10px 14px; color: var(--text2); font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); }
  .tool-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); }
  .tool-table tr:hover td { background: var(--bg2); }
  .tool-table .tool-name { color: var(--orange); font-weight: 600; }
  .tool-table .tool-errors { color: var(--red); }

  .iter-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 11px; }
  .iter-bar .iter-label { min-width: 28px; color: var(--text2); text-align: right; }
  .iter-bar .iter-track { flex: 1; height: 22px; background: var(--bg3); border-radius: 4px; overflow: hidden; display: flex; position: relative; }
  .iter-bar .iter-segment { height: 100%; transition: width 0.3s; }
  .iter-bar .seg-input { background: var(--accent); opacity: 0.7; }
  .iter-bar .seg-output { background: var(--accent2); opacity: 0.7; }
  .iter-bar .seg-thinking { background: var(--purple); opacity: 0.7; }
  .iter-bar .iter-info { min-width: 100px; color: var(--text2); font-size: 10px; }
  .token-legend { display: flex; gap: 16px; margin-bottom: 12px; font-size: 11px; color: var(--text2); }
  .token-legend span::before { content: ''; display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 4px; vertical-align: -1px; }
  .token-legend .leg-input::before { background: var(--accent); opacity: 0.7; }
  .token-legend .leg-output::before { background: var(--accent2); opacity: 0.7; }
  .token-legend .leg-thinking::before { background: var(--purple); opacity: 0.7; }

  /* Timeline */
  .tl-event { display: grid; grid-template-columns: 120px 90px 1fr; gap: 10px; padding: 10px 14px; border-left: 3px solid var(--border); margin-left: 8px; font-size: 12px; }
  .tl-event:hover { background: var(--bg2); }
  .tl-event.tl-model_call { border-left-color: var(--accent); }
  .tl-event.tl-tool { border-left-color: var(--orange); }
  .tl-event.tl-iteration { border-left-color: var(--accent2); }
  .tl-event.tl-loop { border-left-color: var(--purple); }
  .tl-event.tl-log_error { border-left-color: var(--red); background: rgba(248,81,73,0.05); }
  .tl-event.tl-log_warn { border-left-color: var(--orange); background: rgba(210,153,34,0.05); }
  .tl-ts { color: var(--text2); font-size: 11px; }
  .tl-type { font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; }
  .tl-type.tl-t-model_call { color: var(--accent); }
  .tl-type.tl-t-tool { color: var(--orange); }
  .tl-type.tl-t-iteration { color: var(--accent2); }
  .tl-type.tl-t-loop { color: var(--purple); }
  .tl-type.tl-t-log_error { color: var(--red); }
  .tl-type.tl-t-log_warn { color: var(--orange); }
  .tl-label { color: var(--text); }
  .tl-detail { color: var(--text2); font-size: 11px; margin-top: 2px; }
  .tl-dur { color: var(--text2); font-size: 10px; }

  /* Thinking blocks */
  .thinking-toggle { cursor: pointer; user-select: none; }
  .thinking-toggle::before { content: '\25B6 '; font-size: 10px; color: var(--purple); }
  .thinking-toggle.open::before { content: '\25BC '; }
  .thinking-content { display: none; margin-top: 4px; padding: 8px 12px; background: var(--bg); border-radius: 6px; border: 1px solid #2d3555; color: var(--text2); font-size: 12px; }
  .thinking-toggle.open + .thinking-content { display: block; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border); }
</style>
</head>
<body>
<div class="app" id="app">
  <header>
    <h1>ra inspector</h1>
    <select id="handle-select"><option value="">Loading…</option></select>
    <div class="header-sep"></div>
    <div class="tab-group">
      <div class="tab active" data-view="sessions">Sessions</div>
      <div class="tab" data-view="config">Config</div>
      <div class="tab" data-view="context">Context</div>
      <div class="tab" data-view="middleware">Middleware</div>
      <div class="tab" data-view="memory">Memory</div>
    </div>
  </header>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">Sessions</div>
    <div class="sidebar-actions">
      <button class="btn-auto-refresh" id="btn-auto-refresh">Auto-refresh</button>
      <button class="btn-clear-all" id="btn-clear-all">Clear all</button>
    </div>
    <div id="session-list"><div class="loading">Loading…</div></div>
  </div>
  <div class="main" id="main">
    <div id="sub-tabs-container"></div>
    <div id="main-content">
      <div class="empty">Select a session to inspect</div>
    </div>
  </div>
</div>
<script>
(function() {
  const $$ = (s, el) => [...(el || document).querySelectorAll(s)];
  const app = document.getElementById('app');
  const mainContent = document.getElementById('main-content');
  const subTabsContainer = document.getElementById('sub-tabs-container');
  const SESSION_SUB_VIEWS = ['overview', 'timeline', 'messages', 'logs', 'traces'];

  let currentView = 'sessions';       // top-level tab
  let currentSessionView = 'overview'; // session sub-tab
  let currentSession = null;
  let currentNamespace = null;
  let sessionsMap = {};
  let selectedHandle = null;

  function updateLayout() {
    if (currentView === 'sessions') {
      app.classList.remove('no-sidebar');
    } else {
      app.classList.add('no-sidebar');
    }
    updateSubTabs();
  }

  function updateSubTabs() {
    if (currentView === 'sessions' && currentSession) {
      subTabsContainer.innerHTML = '<div class="sub-tabs">' +
        SESSION_SUB_VIEWS.map(function(v) {
          var label = v.charAt(0).toUpperCase() + v.slice(1);
          var cls = v === currentSessionView ? 'sub-tab active' : 'sub-tab';
          return '<div class="' + cls + '" data-subview="' + v + '">' + label + '</div>';
        }).join('') + '</div>';
      $$('.sub-tab', subTabsContainer).forEach(function(tab) {
        tab.addEventListener('click', function() {
          currentSessionView = tab.dataset.subview;
          updateSubTabs();
          loadSessionDetail(currentSession, currentSessionView);
        });
      });
    } else {
      subTabsContainer.innerHTML = '';
    }
  }

  // ── Top-level tabs ──
  $$('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      $$('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentView = tab.dataset.view;
      updateLayout();

      if (currentView === 'sessions') {
        if (currentSession) loadSessionDetail(currentSession, currentSessionView);
        else mainContent.innerHTML = '<div class="empty">Select a session to inspect</div>';
      } else if (currentView === 'memory') {
        loadMemory();
      } else {
        loadHandleView(currentView);
      }
    });
  });

  // ── Handle selector ──
  const handleSelect = document.getElementById('handle-select');

  async function loadHandles() {
    const result = await apiFetch('/api/handles');
    if (result.error) return;
    const { handles, current } = result.data;
    let html = '';
    handles.forEach(function(h) {
      const sel = h === current ? ' selected' : '';
      html += '<option value="' + esc(h) + '"' + sel + '>' + esc(h) + '</option>';
    });
    if (handles.length > 1) {
      html += '<option disabled>──────</option>';
      html += '<option value="__all__">All</option>';
    }
    handleSelect.innerHTML = html;
    selectedHandle = current || (handles[0] || null);
  }

  handleSelect.addEventListener('change', function() {
    selectedHandle = this.value;
    if (currentView === 'sessions') {
      loadSessions();
    } else if (currentView === 'memory') {
      loadMemory();
    } else {
      loadHandleView(currentView);
    }
  });

  document.getElementById('btn-clear-all').addEventListener('click', async function() {
    const isAll = selectedHandle === '__all__';
    const scope = isAll ? 'ALL sessions across ALL projects' : 'all sessions in "' + selectedHandle + '"';
    if (!confirm('Delete ' + scope + '? This cannot be undone.')) return;
    if (isAll) {
      await apiFetch('/api/sessions?all=true', { method: 'DELETE' });
    } else if (selectedHandle) {
      await apiFetch('/api/handles/' + encodeURIComponent(selectedHandle), { method: 'DELETE' });
    }
    currentSession = null;
    currentNamespace = null;
    mainContent.innerHTML = '<div class="empty">Select a session to inspect</div>';
    updateSubTabs();
    loadHandles();
    loadSessions();
  });

  // ── Sessions ──
  async function loadSessions() {
    const isAll = selectedHandle === '__all__';
    const url = isAll ? '/api/sessions?all=true' : '/api/sessions?all=true';
    const result = await apiFetch(url);
    const list = document.getElementById('session-list');
    if (result.error) { list.innerHTML = '<div class="empty" style="color:var(--red)">' + esc(result.error) + '</div>'; return; }
    let sessions = result.data;
    if (!isAll && selectedHandle) {
      sessions = sessions.filter(function(s) { return s.meta.namespace === selectedHandle; });
    }
    if (!sessions.length) { list.innerHTML = '<div class="empty">No sessions</div>'; return; }
    sessionsMap = {};
    sessions.forEach(s => { sessionsMap[s.id] = s.meta; });
    const showNs = isAll;
    list.innerHTML = sessions.map(s => {
      const time = new Date(s.meta.created).toLocaleString();
      const nsLine = s.meta.namespace && showNs
        ? '<div class="namespace">' + esc(s.meta.namespace) + '</div>'
        : '';
      return '<div class="session-item" data-id="' + esc(s.id) + '" data-ns="' + esc(s.meta.namespace || '') + '">' +
        '<button class="delete-btn" data-del-id="' + esc(s.id) + '" data-del-ns="' + esc(s.meta.namespace || '') + '" title="Delete session">\u00d7</button>' +
        nsLine +
        '<div class="id">' + esc(s.id.slice(0, 8)) + '… <span class="badge">' + esc(s.meta.provider) + '/' + esc(s.meta.model) + '</span></div>' +
        '<div class="meta">' + esc(s.meta.interface) + ' · ' + esc(time) + '</div></div>';
    }).join('');
    $$('.session-item', list).forEach(el => {
      el.addEventListener('click', (e) => {
        if (e.target.closest('.delete-btn')) return;
        $$('.session-item').forEach(e => e.classList.remove('active'));
        el.classList.add('active');
        currentSession = el.dataset.id;
        currentNamespace = el.dataset.ns || null;
        updateSubTabs();
        loadSessionDetail(currentSession, currentSessionView);
      });
    });
    $$('.delete-btn', list).forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const id = btn.dataset.delId;
        const ns = btn.dataset.delNs;
        if (!confirm('Delete session ' + id.slice(0, 8) + '…?')) return;
        const url = ns
          ? '/api/sessions/' + encodeURIComponent(ns) + '/' + id
          : '/api/sessions/' + id;
        await apiFetch(url, { method: 'DELETE' });
        if (currentSession === id) { currentSession = null; currentNamespace = null; mainContent.innerHTML = '<div class="empty">Select a session to inspect</div>'; updateSubTabs(); }
        loadSessions();
      });
    });
  }

  // ── Session banner ──
  function sessionBannerHtml(id) {
    const meta = sessionsMap[id];
    if (!meta) return '';
    const nsField = meta.namespace
      ? '<div class="sb-field"><span class="sb-label">Project</span><span class="sb-value">' + esc(meta.namespace) + '</span></div>'
      : '';
    return '<div class="session-banner">' +
      '<div class="sb-field"><span class="sb-label">Session</span><span class="sb-value">' + esc(meta.id) + '</span></div>' +
      nsField +
      '<div class="sb-field"><span class="sb-label">Provider</span><span class="sb-value">' + esc(meta.provider) + '</span></div>' +
      '<div class="sb-field"><span class="sb-label">Model</span><span class="sb-value">' + esc(meta.model) + '</span></div>' +
      '<div class="sb-field"><span class="sb-label">Interface</span><span class="sb-value">' + esc(meta.interface) + '</span></div>' +
      '<div class="sb-field"><span class="sb-label">Created</span><span class="sb-value">' + esc(new Date(meta.created).toLocaleString()) + '</span></div>' +
      '</div>';
  }

  // ── API helper ──
  async function apiFetch(url, opts) {
    try {
      const res = await fetch(url, opts);
      const data = await res.json();
      if (!res.ok) return { error: data.error || 'Request failed (' + res.status + ')' };
      return { data };
    } catch(e) {
      return { error: e.message || 'Network error' };
    }
  }

  function showError(msg) {
    mainContent.innerHTML = '<div class="empty" style="color:var(--red)">' + esc(msg) + '</div>';
  }

  // ── Load session detail ──
  async function loadSessionDetail(id, view) {
    if (!autoRefreshInterval) mainContent.innerHTML = '<div class="loading">Loading…</div>';
    const apiView = view === 'overview' ? 'stats' : view;
    const ns = currentNamespace;
    const sessionUrl = ns
      ? '/api/sessions/' + encodeURIComponent(ns) + '/' + id + '/' + apiView
      : '/api/sessions/' + id + '/' + apiView;
    const result = await apiFetch(sessionUrl);
    if (result.error) { showError(result.error); return; }
    const data = result.data;
    if (view === 'overview') renderOverview(data);
    else if (view === 'timeline') renderTimeline(data);
    else if (view === 'messages') renderMessages(data);
    else if (view === 'logs') renderLogs(data);
    else if (view === 'traces') renderTraces(data);
    mainContent.innerHTML = sessionBannerHtml(id) + mainContent.innerHTML;
  }

  // ── Load handle-scoped views ──
  async function loadHandleView(view) {
    if (!autoRefreshInterval) mainContent.innerHTML = '<div class="loading">Loading…</div>';
    var handleParam = selectedHandle ? '?handle=' + encodeURIComponent(selectedHandle) : '';
    const result = await apiFetch('/api/' + view + handleParam);
    if (result.error) { showError(result.error); return; }
    if (view === 'config') renderConfig(result.data);
    else if (view === 'context') renderContext(result.data);
    else if (view === 'middleware') renderMiddleware(result.data);
  }

  // ── Render Overview ──
  function fmtDuration(ms) {
    if (ms == null) return '-';
    if (ms < 1000) return ms.toFixed(0) + 'ms';
    if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
    return (ms / 60000).toFixed(1) + 'm';
  }
  function fmtTokens(n) {
    if (n == null || n === 0) return '0';
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
    return String(n);
  }

  function renderOverview(stats) {
    if (!stats || !stats.iterations) {
      mainContent.innerHTML = '<div class="empty">No trace data available for this session.<br><span style="font-size:11px;color:var(--text2)">Traces are enabled by default. Check that <code style="color:var(--accent)">tracesEnabled: true</code> in config.</span></div>';
      return;
    }

    let html = '';

    // Stats cards
    html += '<div class="stats-grid">' +
      '<div class="stat-card accent"><div class="stat-value">' + fmtDuration(stats.totalDurationMs) + '</div><div class="stat-label">Duration</div></div>' +
      '<div class="stat-card"><div class="stat-value">' + stats.iterations + '</div><div class="stat-label">Iterations</div></div>' +
      '<div class="stat-card green"><div class="stat-value">' + fmtTokens(stats.totalTokens) + '</div><div class="stat-label">Total Tokens</div></div>' +
      '<div class="stat-card"><div class="stat-value">' + fmtTokens(stats.inputTokens) + '</div><div class="stat-label">Input Tokens</div></div>' +
      '<div class="stat-card"><div class="stat-value">' + fmtTokens(stats.outputTokens) + '</div><div class="stat-label">Output Tokens</div></div>' +
      (stats.thinkingTokens ? '<div class="stat-card"><div class="stat-value">' + fmtTokens(stats.thinkingTokens) + '</div><div class="stat-label">Thinking Tokens</div></div>' : '') +
      (stats.cacheReadTokens || stats.cacheCreationTokens ? '<div class="stat-card green"><div class="stat-value">' + (stats.cacheHitPercent != null ? stats.cacheHitPercent : 0) + '%</div><div class="stat-label">Cache Hit</div></div>' +
        '<div class="stat-card"><div class="stat-value">' + fmtTokens(stats.cacheReadTokens) + '</div><div class="stat-label">Cache Read</div></div>' +
        '<div class="stat-card"><div class="stat-value">' + fmtTokens(stats.cacheCreationTokens) + '</div><div class="stat-label">Cache Write</div></div>' : '') +
      '<div class="stat-card orange"><div class="stat-value">' + stats.totalToolCalls + '</div><div class="stat-label">Tool Calls</div></div>' +
      (stats.totalToolErrors ? '<div class="stat-card error"><div class="stat-value">' + stats.totalToolErrors + '</div><div class="stat-label">Tool Errors</div></div>' : '') +
      '<div class="stat-card"><div class="stat-value">' + stats.totalMessages + '</div><div class="stat-label">Messages</div></div>' +
      (stats.status === 'error' ? '<div class="stat-card error"><div class="stat-value">ERROR</div><div class="stat-label">Status</div></div>' : '<div class="stat-card green"><div class="stat-value">OK</div><div class="stat-label">Status</div></div>') +
      '</div>';

    // Token usage per iteration
    if (stats.iterationStats && stats.iterationStats.length) {
      html += '<div class="config-section"><h2>Tokens per Iteration</h2>';
      html += '<div class="token-legend"><span class="leg-input">Input</span><span class="leg-output">Output</span><span class="leg-thinking">Thinking</span></div>';
      var maxTok = Math.max(1, ...stats.iterationStats.map(function(i) { return i.inputTokens + i.outputTokens + i.thinkingTokens; }));
      html += stats.iterationStats.map(function(it) {
        var inPct = (it.inputTokens / maxTok * 100).toFixed(1);
        var outPct = (it.outputTokens / maxTok * 100).toFixed(1);
        var thinkPct = (it.thinkingTokens / maxTok * 100).toFixed(1);
        var toolStr = it.toolNames && it.toolNames.length ? it.toolNames.join(', ') : 'no tools';
        return '<div class="iter-bar">' +
          '<span class="iter-label">#' + it.iteration + '</span>' +
          '<div class="iter-track">' +
            '<div class="iter-segment seg-input" style="width:' + inPct + '%"></div>' +
            '<div class="iter-segment seg-output" style="width:' + outPct + '%"></div>' +
            '<div class="iter-segment seg-thinking" style="width:' + thinkPct + '%"></div>' +
          '</div>' +
          '<span class="iter-info">' + fmtDuration(it.durationMs) + ' · ' + fmtTokens(it.inputTokens + it.outputTokens + it.thinkingTokens) + ' tok' + (it.cacheReadTokens || it.cacheCreationTokens ? ' · ' + (it.cacheHitPercent != null ? it.cacheHitPercent : 0) + '% cached' : '') + ' · ' + it.toolCalls + ' tools</span>' +
        '</div>';
      }).join('');
      html += '</div>';
    }

    // Tool summary table
    if (stats.tools && stats.tools.length) {
      html += '<div class="config-section"><h2>Tool Usage</h2>' +
        '<table class="tool-table"><thead><tr><th>Tool</th><th>Calls</th><th>Errors</th><th>Total Time</th><th>Avg Time</th></tr></thead><tbody>' +
        stats.tools.map(function(t) {
          return '<tr>' +
            '<td class="tool-name">' + esc(t.name) + '</td>' +
            '<td>' + t.calls + '</td>' +
            '<td' + (t.errors ? ' class="tool-errors"' : '') + '>' + t.errors + '</td>' +
            '<td>' + fmtDuration(t.totalMs) + '</td>' +
            '<td>' + fmtDuration(t.calls ? t.totalMs / t.calls : 0) + '</td></tr>';
        }).join('') +
        '</tbody></table></div>';
    }

    mainContent.innerHTML = html;
  }

  // ── Render Timeline ──
  function renderTimeline(events) {
    if (!events || !events.length) {
      mainContent.innerHTML = '<div class="empty">No timeline events. Enable observability to see the timeline.</div>';
      return;
    }
    mainContent.innerHTML = events.map(function(ev) {
      var ts = ev.ts ? new Date(ev.ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit',fractionalSecondDigits:3}) : '';
      var dur = ev.durationMs != null ? fmtDuration(ev.durationMs) : '';
      return '<div class="tl-event tl-' + esc(ev.type) + '">' +
        '<span class="tl-ts">' + esc(ts) + (dur ? ' <span class="tl-dur">(' + esc(dur) + ')</span>' : '') + '</span>' +
        '<span class="tl-type tl-t-' + esc(ev.type) + '">' + esc(ev.type.replace('log_','').replace('_',' ')) + '</span>' +
        '<span><span class="tl-label">' + esc(ev.label) + '</span>' +
        (ev.detail ? '<div class="tl-detail">' + esc(ev.detail) + '</div>' : '') +
        '</span></div>';
    }).join('');
  }

  // ── Render Messages ──
  function renderMessages(messages) {
    if (!messages.length) { mainContent.innerHTML = '<div class="empty">No messages</div>'; return; }
    mainContent.innerHTML = messages.map(m => {
      const role = m.role || 'unknown';
      const cls = role === 'tool' ? 'tool' : role;
      let content = '';
      if (typeof m.content === 'string') {
        content = esc(m.content);
      } else if (Array.isArray(m.content)) {
        content = m.content.map(block => {
          if (typeof block === 'string') return esc(block);
          if (block.type === 'text') return esc(block.text || '');
          if (block.type === 'thinking') {
            return '<span class="thinking-toggle" onclick="this.classList.toggle(\'open\')">[thinking] ' + esc((block.thinking || '').slice(0, 80)) + (block.thinking && block.thinking.length > 80 ? '…' : '') + '</span>' +
              '<div class="thinking-content">' + esc(block.thinking || '') + '</div>';
          }
          if (block.type === 'tool_use') return '<span style="color:var(--orange)">[tool_use: ' + esc(block.name || '') + ']</span>\n' + highlightJson(block.input);
          if (block.type === 'tool_result') return '<span style="color:var(--accent2)">[tool_result]</span>\n' + esc(typeof block.content === 'string' ? block.content : JSON.stringify(block.content, null, 2));
          return esc(JSON.stringify(block, null, 2));
        }).join('\n');
      } else if (m.content != null) {
        content = esc(JSON.stringify(m.content, null, 2));
      }

      let toolCallsHtml = '';
      if (m.toolCalls && m.toolCalls.length) {
        toolCallsHtml = '<div class="tool-calls">' + m.toolCalls.map(tc =>
          '<div class="tool-call"><span class="name">' + esc(tc.name || tc.function?.name || 'tool') + '</span>' +
          '<div class="args">' + highlightJson(tc.input || tc.arguments || tc.function?.arguments) + '</div></div>'
        ).join('') + '</div>';
      }

      return '<div class="message ' + cls + '">' +
        '<div class="role">' + esc(role) + (m.toolCallId ? ' <span class="badge">' + esc(m.toolCallId) + '</span>' : '') + '</div>' +
        '<div class="content">' + content + '</div>' +
        toolCallsHtml + '</div>';
    }).join('');
    mainContent.scrollTop = mainContent.scrollHeight;
  }

  // ── Render Logs ──
  function renderLogs(logs) {
    if (!logs.length) { mainContent.innerHTML = '<div class="empty">No logs</div>'; return; }
    mainContent.innerHTML = logs.map(log => {
      const ts = log.timestamp ? new Date(log.timestamp).toLocaleString() : '';
      const level = (log.level || 'info').toLowerCase();
      const msg = log.message || '';
      const rest = Object.keys(log).filter(k => !['timestamp','level','message','sessionId'].includes(k));
      const extra = rest.length ? rest.map(k => esc(k) + '=' + esc(JSON.stringify(log[k]))).join(' ') : '';
      return '<div class="log-entry">' +
        '<span class="log-ts">' + esc(ts) + '</span>' +
        '<span class="log-level ' + level + '">' + esc(level) + '</span>' +
        '<span><span class="log-msg">' + esc(msg) + '</span>' +
        (extra ? '<div class="log-data">' + extra + '</div>' : '') + '</span></div>';
    }).join('');
  }

  // ── Render Traces ──
  function renderTraces(traces) {
    if (!traces.length) { mainContent.innerHTML = '<div class="empty">No traces</div>'; return; }
    const byTrace = new Map();
    for (const t of traces) {
      const tid = t.traceId || 'unknown';
      if (!byTrace.has(tid)) byTrace.set(tid, []);
      byTrace.get(tid).push(t);
    }
    let html = '';
    for (const [tid, spans] of byTrace) {
      html += '<div style="margin-bottom:16px"><div style="font-size:11px;color:var(--text2);margin-bottom:8px">Trace ' + esc(tid.slice(0,8)) + '…</div>';
      const byId = new Map();
      const roots = [];
      for (const s of spans) byId.set(s.spanId, s);
      for (const s of spans) {
        if (!s.parentSpanId || !byId.has(s.parentSpanId)) roots.push(s);
      }
      function renderSpan(span, depth) {
        const dur = span.durationMs != null ? span.durationMs.toFixed(1) + 'ms' : '';
        const status = span.status || 'ok';
        const attrs = span.attributes || {};
        const attrHtml = Object.entries(attrs).map(([k,v]) =>
          '<div class="attr-row"><span class="attr-key">' + esc(k) + '</span><span class="attr-val">' + esc(JSON.stringify(v)) + '</span></div>'
        ).join('');
        let eventsHtml = '';
        if (span.events && span.events.length) {
          eventsHtml = '<div style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px">' +
            span.events.map(ev => '<div class="attr-row"><span class="attr-key">' + esc(ev.name) + '</span><span class="attr-val">' + esc(JSON.stringify(ev.attributes || {})) + '</span></div>').join('') + '</div>';
        }
        const indent = depth * 20;
        let out = '<div class="trace-entry" style="margin-left:' + indent + 'px">' +
          '<div class="trace-header" onclick="this.parentElement.classList.toggle(\'open\')">' +
          '<span class="trace-name">' + esc(span.name) + '</span>' +
          '<span class="trace-duration">' + esc(dur) + '</span>' +
          '<span class="trace-status ' + status + '">' + esc(status) + '</span></div>' +
          '<div class="trace-attrs">' + attrHtml + eventsHtml + '</div></div>';
        const children = spans.filter(s => s.parentSpanId === span.spanId);
        children.sort((a,b) => (a.timestamp || '').localeCompare(b.timestamp || ''));
        for (const child of children) out += renderSpan(child, depth + 1);
        return out;
      }
      for (const root of roots) html += renderSpan(root, 0);
      html += '</div>';
    }
    mainContent.innerHTML = html;
  }

  // ── Memory CRUD ──
  let memoryQuery = '';

  function memoryToolbarHtml() {
    return '<div class="memory-toolbar">' +
      '<input type="text" placeholder="Search memories…" id="mem-q" value="' + esc(memoryQuery) + '">' +
      '<button class="btn-primary" onclick="searchMem()">Search</button>' +
      '<button class="btn-success" onclick="toggleAddForm()">+ Add</button>' +
    '</div>' +
    '<div id="mem-form-container"></div>' +
    '<div id="mem-list"><div class="loading">Loading…</div></div>';
  }

  async function loadMemory(query) {
    memoryQuery = query || '';
    mainContent.innerHTML = memoryToolbarHtml();
    const url = memoryQuery ? '/api/memory?q=' + encodeURIComponent(memoryQuery) : '/api/memory';
    const result = await apiFetch(url);
    const list = document.getElementById('mem-list');
    if (result.error) { list.innerHTML = '<div class="empty" style="color:var(--red)">' + esc(result.error) + '</div>'; return; }
    const body = result.data;
    if (body && body.enabled === false) {
      list.innerHTML = '<div class="empty">Memory is not enabled.<br><span style="font-size:11px;color:var(--text2)">Start ra with <code style="color:var(--accent)">--memory</code> or set <code style="color:var(--accent)">memory.enabled: true</code> in config.</span></div>';
      return;
    }
    const memories = body.memories || [];
    if (!memories.length) { list.innerHTML = '<div class="empty">No memories</div>'; return; }
    list.innerHTML = memories.map(m =>
      '<div class="memory-item" data-id="' + m.id + '">' +
        '<div class="memory-content">' + esc(m.content) + '</div>' +
        '<div class="memory-meta">' +
          '<span>' + esc(m.createdAt || '') + '</span>' +
          (m.tags ? '<span class="memory-tags">' + esc(m.tags) + '</span>' : '') +
          '<span class="badge">id:' + m.id + '</span>' +
          '<span class="memory-actions"><button class="btn-danger" onclick="deleteMem(' + m.id + ')">Delete</button></span>' +
        '</div>' +
      '</div>'
    ).join('');
  }

  window.searchMem = () => {
    const q = document.getElementById('mem-q');
    loadMemory(q ? q.value : '');
  };

  window.toggleAddForm = () => {
    const container = document.getElementById('mem-form-container');
    if (container.innerHTML) { container.innerHTML = ''; return; }
    container.innerHTML =
      '<div class="memory-form">' +
        '<label>Content</label>' +
        '<textarea id="mem-content" placeholder="Memory content…"></textarea>' +
        '<div class="form-row">' +
          '<input type="text" id="mem-tags" placeholder="Tags (optional, comma-separated)">' +
          '<button class="btn-success" onclick="saveMem()">Save</button>' +
        '</div>' +
        '<div id="mem-save-error"></div>' +
      '</div>';
    document.getElementById('mem-content').focus();
  };

  window.saveMem = async () => {
    const content = document.getElementById('mem-content').value.trim();
    if (!content) return;
    const tags = document.getElementById('mem-tags').value.trim();
    const result = await apiFetch('/api/memory', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content, tags }),
    });
    if (result.error) {
      const el = document.getElementById('mem-save-error');
      if (el) el.innerHTML = '<div style="color:var(--red);font-size:12px;margin-top:8px">' + esc(result.error) + '</div>';
      return;
    }
    loadMemory(memoryQuery);
  };

  window.deleteMem = async (id) => {
    if (!confirm('Delete memory #' + id + '?')) return;
    const result = await apiFetch('/api/memory/' + id, { method: 'DELETE' });
    if (result.error) { alert('Delete failed: ' + result.error); return; }
    loadMemory(memoryQuery);
  };

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.target && e.target.id === 'mem-q') window.searchMem();
  });

  // ── Config ──
  function renderConfig(config) {
    mainContent.innerHTML = '<div class="config-section"><h2>Resolved Configuration</h2>' +
      '<div class="config-block">' + esc(JSON.stringify(config, null, 2)) + '</div></div>';
  }

  // ── Context ──
  function renderContext(data) {
    if (!data.files || !data.files.length) {
      mainContent.innerHTML = '<div class="config-section"><h2>Context Files</h2>' +
        '<div class="empty">No context files discovered</div></div>';
      return;
    }
    mainContent.innerHTML = '<div class="config-section"><h2>Context Files <span class="badge">' + data.files.length + ' files</span></h2>' +
      data.files.map(f =>
        '<div class="context-file">' +
        '<div class="context-file-header" onclick="this.parentElement.classList.toggle(\'open\')">' +
        '<span class="context-file-path">' + esc(f.relativePath) + '</span>' +
        '<span class="badge">' + (f.content ? f.content.length + ' chars' : '') + '</span></div>' +
        '<div class="context-file-body">' + esc(f.content) + '</div></div>'
      ).join('') +
      '</div>' +
      '<div class="config-section"><h2>Context Patterns</h2>' +
      '<div class="config-block">' + esc(JSON.stringify(data.patterns, null, 2)) + '</div></div>';
  }

  // ── Middleware ──
  function renderMiddleware(data) {
    const hooks = data.hooks || {};
    const hookNames = Object.keys(hooks);
    let html = '';
    if (hookNames.length) {
      html += '<div class="config-section"><h2>Active Hooks</h2>' +
        hookNames.map(name => {
          const fns = hooks[name] || [];
          return '<div class="mw-hook"><div class="mw-hook-name">' + esc(name) + ' <span class="badge">' + fns.length + '</span></div>' +
            fns.map(fn => '<div class="mw-hook-entry">' + esc(fn) + '</div>').join('') + '</div>';
        }).join('') + '</div>';
    } else {
      html += '<div class="config-section"><h2>Active Hooks</h2>' +
        '<div class="empty">No middleware hooks active</div></div>';
    }
    html += '<div class="config-section"><h2>Middleware Config (from config file)</h2>' +
      '<div class="config-block">' + esc(JSON.stringify(data.configMiddleware || {}, null, 2)) + '</div></div>';
    mainContent.innerHTML = html;
  }

  function esc(s) { if (s == null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function highlightJson(obj) {
    if (obj == null) return '';
    // tc.arguments is a JSON string — parse it first so we can pretty-print
    let parsed = obj;
    if (typeof obj === 'string') {
      try { parsed = JSON.parse(obj); } catch { return esc(obj); }
    }
    return esc(JSON.stringify(parsed, null, 2));
  }

  // ── Auto-refresh ──
  let autoRefreshInterval = null;
  const AUTO_REFRESH_MS = 1500;
  const autoRefreshBtn = document.getElementById('btn-auto-refresh');

  function autoRefreshTick() {
    loadSessions();
    if (currentView === 'sessions' && currentSession) {
      loadSessionDetail(currentSession, currentSessionView);
    }
  }

  autoRefreshBtn.addEventListener('click', function() {
    if (autoRefreshInterval) {
      clearInterval(autoRefreshInterval);
      autoRefreshInterval = null;
      this.classList.remove('active');
      this.textContent = 'Auto-refresh';
    } else {
      autoRefreshInterval = setInterval(autoRefreshTick, AUTO_REFRESH_MS);
      this.classList.add('active');
      this.textContent = 'Auto-refresh (on)';
      autoRefreshTick();
    }
  });

  loadHandles();
  loadSessions();
})();
</script>
</body>
</html>
