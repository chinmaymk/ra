<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="6" fill="#073642"/>
  <!-- sun rays -->
  <g stroke="#2aa198" stroke-width="1.5" stroke-linecap="round" opacity="0.5">
    <line x1="16" y1="3" x2="16" y2="6"/>
    <line x1="16" y1="26" x2="16" y2="29"/>
    <line x1="3" y1="16" x2="6" y2="16"/>
    <line x1="26" y1="16" x2="29" y2="16"/>
    <line x1="6.8" y1="6.8" x2="8.9" y2="8.9"/>
    <line x1="23.1" y1="23.1" x2="25.2" y2="25.2"/>
    <line x1="25.2" y1="6.8" x2="23.1" y2="8.9"/>
    <line x1="8.9" y1="23.1" x2="6.8" y2="25.2"/>
  </g>
  <!-- sun disk -->
  <circle cx="16" cy="16" r="7.5" fill="none" stroke="#2aa198" stroke-width="2"/>
  <!-- ra's eye — the center dot -->
  <circle cx="16" cy="16" r="2" fill="#2aa198"/>
</svg>
