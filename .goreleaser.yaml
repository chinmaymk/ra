version: 2

project_name: ra

builds:
  - builder: bun
    flags:
      - --compile
      - --define
      - __RA_VERSION__="\"{{ .Version }}\""
      - --define
      - __RA_COMMIT__="\"{{ .ShortCommit }}\""
    targets:
      - linux-x64
      - linux-arm64
      - darwin-x64
      - darwin-arm64
      - windows-x64

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip

universal_binaries:
  - replace: true

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  footer: >-
    ---

    **Install:** `curl -fsSL https://raw.githubusercontent.com/chinmaymk/ra/main/install.sh | sh`
