services:
  ra:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${RA_HTTP_PORT:-3000}:3000"
      - "${RA_MCP_SERVER_PORT:-3001}:3001"
    environment:
      - RA_PROVIDER=${RA_PROVIDER:-anthropic}
      - RA_MODEL=${RA_MODEL:-claude-sonnet-4-6}
      - RA_ANTHROPIC_API_KEY=${RA_ANTHROPIC_API_KEY}
      - RA_OPENAI_API_KEY=${RA_OPENAI_API_KEY}
      - RA_GOOGLE_API_KEY=${RA_GOOGLE_API_KEY}
      - RA_HTTP_TOKEN=${RA_HTTP_TOKEN}
      - RA_HTTP_CORS_ORIGINS=${RA_HTTP_CORS_ORIGINS}
      - RA_HTTP_RATE_LIMIT_MAX=${RA_HTTP_RATE_LIMIT_MAX:-100}
      - RA_HTTP_RATE_LIMIT_WINDOW_MS=${RA_HTTP_RATE_LIMIT_WINDOW_MS:-60000}
      - RA_LOG_LEVEL=${RA_LOG_LEVEL:-info}
      - RA_LOG_FORMAT=json
      - NODE_ENV=production
    volumes:
      - ra-sessions:/app/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  ra-sessions:
