name: 'ra - AI Agent'
description: 'Run the ra agentic loop in your GitHub Actions workflow'
branding:
  icon: 'cpu'
  color: 'orange'

inputs:
  # --- Core (maps to RaConfig top-level) ---
  prompt:
    description: 'The prompt to send to the agent'
    required: true
  provider:
    description: 'LLM provider (anthropic, openai, google, ollama, bedrock, azure)'
    required: false
    default: 'anthropic'
  model:
    description: 'Model name to use (e.g. claude-sonnet-4-6, gpt-4o)'
    required: false
  system-prompt:
    description: 'System prompt text or path to a file'
    required: false
  max-iterations:
    description: 'Maximum agent loop iterations (maps to maxIterations)'
    required: false
    default: '50'
  tool-timeout:
    description: 'Tool execution timeout in milliseconds (maps to toolTimeout)'
    required: false
  thinking:
    description: 'Extended thinking level (low, medium, high)'
    required: false
  builtin-tools:
    description: 'Enable built-in tools (maps to builtinTools, default true)'
    required: false
    default: 'true'

  # --- Skills (maps to RaConfig.skills / skillDirs) ---
  skills:
    description: 'Comma-separated list of skills to activate'
    required: false
  skill-dirs:
    description: 'Comma-separated list of directories to load skills from'
    required: false

  # --- Files (CLI-only, not in RaConfig) ---
  files:
    description: 'Comma-separated list of files to attach to the prompt'
    required: false

  # --- Memory (maps to RaConfig.memory) ---
  memory:
    description: 'Enable persistent memory (maps to memory.enabled)'
    required: false
    default: 'false'

  # --- Provider connection options (maps to RaConfig.providers.*) ---
  anthropic-base-url:
    description: 'Custom base URL for Anthropic API (maps to providers.anthropic.baseURL)'
    required: false
  openai-base-url:
    description: 'Custom base URL for OpenAI API (maps to providers.openai.baseURL)'
    required: false
  google-base-url:
    description: 'Custom base URL for Google API (maps to providers.google.baseURL)'
    required: false
  ollama-host:
    description: 'Ollama server host (maps to providers.ollama.host)'
    required: false
  azure-endpoint:
    description: 'Azure OpenAI endpoint (maps to providers.azure.endpoint)'
    required: false
  azure-deployment:
    description: 'Azure OpenAI deployment name (maps to providers.azure.deployment)'
    required: false

  # --- Action-specific (not in RaConfig) ---
  config:
    description: 'Path to ra config file (ra.config.yml, ra.config.json, etc.)'
    required: false
  version:
    description: 'ra version to use (e.g. v0.1.0). Defaults to latest release.'
    required: false
    default: 'latest'
  fail-on-error:
    description: 'Whether to fail the workflow if ra exits with a non-zero code (true/false)'
    required: false
    default: 'true'

outputs:
  exit-code:
    description: 'The exit code from the ra process'
    value: ${{ steps.run.outputs.exit-code }}
  result:
    description: 'The agent output text'
    value: ${{ steps.run.outputs.result }}

runs:
  using: 'composite'
  steps:
    - name: Download ra binary
      id: download
      shell: bash
      env:
        RA_VERSION: ${{ inputs.version }}
      run: ${{ github.action_path }}/action/download.sh

    - name: Run ra
      id: run
      shell: bash
      env:
        INPUT_PROMPT: ${{ inputs.prompt }}
        INPUT_PROVIDER: ${{ inputs.provider }}
        INPUT_MODEL: ${{ inputs.model }}
        INPUT_SYSTEM_PROMPT: ${{ inputs.system-prompt }}
        INPUT_SKILLS: ${{ inputs.skills }}
        INPUT_SKILL_DIRS: ${{ inputs.skill-dirs }}
        INPUT_FILES: ${{ inputs.files }}
        INPUT_MAX_ITERATIONS: ${{ inputs.max-iterations }}
        INPUT_THINKING: ${{ inputs.thinking }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_TOOL_TIMEOUT: ${{ inputs.tool-timeout }}
        INPUT_BUILTIN_TOOLS: ${{ inputs.builtin-tools }}
        INPUT_MEMORY: ${{ inputs.memory }}
        INPUT_ANTHROPIC_BASE_URL: ${{ inputs.anthropic-base-url }}
        INPUT_OPENAI_BASE_URL: ${{ inputs.openai-base-url }}
        INPUT_GOOGLE_BASE_URL: ${{ inputs.google-base-url }}
        INPUT_OLLAMA_HOST: ${{ inputs.ollama-host }}
        INPUT_AZURE_ENDPOINT: ${{ inputs.azure-endpoint }}
        INPUT_AZURE_DEPLOYMENT: ${{ inputs.azure-deployment }}
        INPUT_FAIL_ON_ERROR: ${{ inputs.fail-on-error }}
      run: ${{ github.action_path }}/action/run.sh
