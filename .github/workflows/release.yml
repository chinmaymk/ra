name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun tsc --noEmit

      - name: Test
        run: bun test

  build:
    name: Build (${{ matrix.target }})
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            asset: ra-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            asset: ra-linux-arm64
          - os: macos-latest
            target: bun-darwin-x64
            asset: ra-darwin-x64
          - os: macos-latest
            target: bun-darwin-arm64
            asset: ra-darwin-arm64
          - os: windows-latest
            target: bun-windows-x64
            asset: ra-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: bun build src/index.ts --compile --target ${{ matrix.target }} --outfile dist/${{ matrix.asset }}

      - name: Strip binary (Linux x64)
        if: matrix.target == 'bun-linux-x64'
        run: strip dist/${{ matrix.asset }}

      - name: Strip binary (Linux arm64)
        if: matrix.target == 'bun-linux-arm64'
        run: |
          sudo apt-get update && sudo apt-get install -y binutils-aarch64-linux-gnu
          aarch64-linux-gnu-strip dist/${{ matrix.asset }}

      - name: Strip binary (macOS)
        if: startsWith(matrix.target, 'bun-darwin')
        run: strip dist/${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist/ -type f -exec mv {} release/ \;
          ls -lh release/

      - name: Compress binaries
        working-directory: release
        run: |
          for f in ra-linux-* ra-darwin-*; do
            gzip -9 "$f"
          done
          for f in ra-windows-*; do
            zip -9 "${f%.exe}.zip" "$f" && rm "$f"
          done
          ls -lh

      - name: Create checksums
        working-directory: release
        run: sha256sum * > checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true

  publish-npm:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install

      - name: Build type declarations
        run: bun run build:types

      - name: Set version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
