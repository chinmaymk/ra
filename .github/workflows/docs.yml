name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: docs/site

      - name: Determine latest tag
        id: latest-tag
        run: |
          LATEST=$(git tag -l 'v*' --sort=-version:refname | head -n1)
          if [ -n "$LATEST" ]; then
            echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
            echo "version=${LATEST#v}" >> "$GITHUB_OUTPUT"
            echo "Latest tag: $LATEST"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "No tags found"
          fi

      - name: Build dev docs (from main)
        working-directory: docs/site
        run: |
          # Override base to /ra/dev/ for the main branch build
          cat > .vitepress/config.dev.ts << 'DEVCONF'
          import baseConfig from './config'
          import { defineConfig, mergeConfig } from 'vitepress'
          export default mergeConfig(baseConfig, defineConfig({ base: '/ra/dev/' }))
          DEVCONF
          DOCS_VERSION="dev" bun vitepress build --config .vitepress/config.dev.ts
          # Save dev build aside
          mv .vitepress/dist /tmp/dev-docs-dist

      - name: Build latest tag docs (for site root)
        if: steps.latest-tag.outputs.tag != ''
        working-directory: docs/site
        run: |
          LATEST_TAG="${{ steps.latest-tag.outputs.tag }}"
          LATEST_VERSION="${{ steps.latest-tag.outputs.version }}"

          TAG_DIR=$(mktemp -d)
          git archive "$LATEST_TAG" -- docs/site/ | tar -x -C "$TAG_DIR"

          # Use current theme
          rm -rf "$TAG_DIR/docs/site/.vitepress/theme"
          cp -r .vitepress/theme "$TAG_DIR/docs/site/.vitepress/theme"

          # Build with root base path
          cat > "$TAG_DIR/docs/site/.vitepress/config.ts" << VCONF
          import { defineConfig } from 'vitepress'
          export default defineConfig({
            title: 'ra',
            base: '/ra/',
            appearance: 'dark',
            themeConfig: {
              logo: '/logo.svg',
              search: { provider: 'local' },
            },
          })
          VCONF

          (cd "$TAG_DIR/docs/site" && bun install && DOCS_VERSION="$LATEST_VERSION" bun vitepress build)
          # This becomes the root site
          mkdir -p /tmp/root-docs-dist
          cp -r "$TAG_DIR/docs/site/.vitepress/dist/"* /tmp/root-docs-dist/
          rm -rf "$TAG_DIR"

      - name: Compute version cache key
        id: version-key
        run: |
          # Build a stable key from all tag names + their SHAs
          KEY=$(git tag -l 'v*' --sort=-version:refname | while read tag; do
            echo "$tag=$(git rev-parse "$tag")"
          done | sha256sum | cut -d' ' -f1)
          echo "key=docs-versions-${KEY}" >> "$GITHUB_OUTPUT"

      - name: Restore versioned docs cache
        id: versioned-cache
        uses: actions/cache@v4
        with:
          path: /tmp/versioned-docs-dist
          key: ${{ steps.version-key.outputs.key }}
          restore-keys: docs-versions-

      - name: Build versioned docs from tags
        working-directory: docs/site
        run: |
          TAGS=$(git tag -l 'v*' --sort=-version:refname)
          mkdir -p /tmp/versioned-docs-dist

          for tag in $TAGS; do
            version="${tag#v}"

            # Skip if already cached from a previous build
            if [ -d "/tmp/versioned-docs-dist/$version" ]; then
              echo "Cache hit for $tag — skipping build"
              continue
            fi

            echo "Building docs for $tag..."

            # Check out the docs/site content from this tag
            TAG_DIR=$(mktemp -d)
            git archive "$tag" -- docs/site/ | tar -x -C "$TAG_DIR" 2>/dev/null || {
              echo "  Skipping $tag — no docs/site/"
              rm -rf "$TAG_DIR"
              continue
            }

            if [ ! -f "$TAG_DIR/docs/site/package.json" ]; then
              echo "  Skipping $tag — no package.json"
              rm -rf "$TAG_DIR"
              continue
            fi

            # Copy the current theme so version switcher works
            rm -rf "$TAG_DIR/docs/site/.vitepress/theme"
            cp -r .vitepress/theme "$TAG_DIR/docs/site/.vitepress/theme"

            # Overwrite the config to set the versioned base path
            cat > "$TAG_DIR/docs/site/.vitepress/config.ts" << VCONF
import { defineConfig } from 'vitepress'
export default defineConfig({
  title: 'ra',
  base: '/ra/v/${version}/',
  appearance: 'dark',
  themeConfig: {
    logo: '/logo.svg',
    search: { provider: 'local' },
  },
})
VCONF

            # Install deps and build
            (cd "$TAG_DIR/docs/site" && bun install && DOCS_VERSION="$version" bun vitepress build) || {
              echo "  Warning: build failed for $tag, skipping"
              rm -rf "$TAG_DIR"
              continue
            }

            # Save to cache dir
            mkdir -p "/tmp/versioned-docs-dist/$version"
            cp -r "$TAG_DIR/docs/site/.vitepress/dist/"* "/tmp/versioned-docs-dist/$version/"
            rm -rf "$TAG_DIR"
            echo "  Done: v$version"
          done

      - name: Assemble site
        working-directory: docs/site
        run: |
          TAGS=$(git tag -l 'v*' --sort=-version:refname)
          LATEST_VERSION="${{ steps.latest-tag.outputs.version }}"

          # Start with latest tag as root (or dev if no tags)
          mkdir -p .vitepress/dist
          if [ -d /tmp/root-docs-dist ]; then
            cp -r /tmp/root-docs-dist/* .vitepress/dist/
          else
            cp -r /tmp/dev-docs-dist/* .vitepress/dist/
          fi

          # Add dev docs
          mkdir -p .vitepress/dist/dev
          cp -r /tmp/dev-docs-dist/* .vitepress/dist/dev/

          # Add versioned docs and build versions.json
          VERSIONS_JSON="{ \"latest\": \"${LATEST_VERSION}\", \"versions\": ["
          first=true

          for tag in $TAGS; do
            version="${tag#v}"
            if [ -d "/tmp/versioned-docs-dist/$version" ]; then
              mkdir -p ".vitepress/dist/v/$version"
              cp -r "/tmp/versioned-docs-dist/$version/"* ".vitepress/dist/v/$version/"

              if [ "$first" = true ]; then
                VERSIONS_JSON="${VERSIONS_JSON}\"${version}\""
                first=false
              else
                VERSIONS_JSON="${VERSIONS_JSON},\"${version}\""
              fi
            fi
          done

          VERSIONS_JSON="${VERSIONS_JSON}]}"
          echo "$VERSIONS_JSON" > .vitepress/dist/versions.json
          echo "versions.json: $VERSIONS_JSON"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/site/.vitepress/dist
