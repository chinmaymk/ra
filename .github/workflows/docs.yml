name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/site/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: docs/site

      - name: Build latest docs
        run: bun run build
        working-directory: docs/site

      - name: Build versioned docs
        working-directory: docs/site
        run: |
          # Read versions from versions.json and build each one
          if [ -f versions.json ] && [ "$(cat versions.json)" != "[]" ]; then
            for version in $(bun -e "console.log(JSON.parse(require('fs').readFileSync('versions.json','utf-8')).join('\n'))"); do
              if [ -d "versioned/$version" ]; then
                echo "Building docs for v$version..."
                # Create a temporary VitePress config for this version
                mkdir -p "versioned/$version/.vitepress"
                cat > "versioned/$version/.vitepress/config.ts" << 'VCONF'
          import baseConfig from '../../../.vitepress/config'
          import { defineConfig, mergeConfig } from 'vitepress'
          export default mergeConfig(baseConfig, defineConfig({ base: `/ra/v/${process.env.DOCS_VERSION}/` }))
          VCONF
                # Copy theme so versioned builds use the same components
                cp -r .vitepress/theme "versioned/$version/.vitepress/theme"
                # Build with the version-specific base path
                DOCS_VERSION=$version bun vitepress build "versioned/$version"
                # Move output into the main dist under v/<version>/
                mkdir -p ".vitepress/dist/v/$version"
                cp -r "versioned/$version/.vitepress/dist/"* ".vitepress/dist/v/$version/"
              fi
            done
          fi

      - name: Copy versions.json to dist
        run: cp versions.json .vitepress/dist/versions.json
        working-directory: docs/site

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/site/.vitepress/dist
