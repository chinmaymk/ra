name: Docs deploy

on:
  workflow_call:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: docs/site

      - name: Compute version cache key
        id: version-key
        run: |
          KEY=$(git tag -l 'v*' --sort=-version:refname | while read tag; do
            echo "$tag=$(git rev-parse "$tag")"
          done | sha256sum | cut -d' ' -f1)
          echo "key=docs-versions-${KEY}" >> "$GITHUB_OUTPUT"

      - name: Restore versioned docs cache
        id: versioned-cache
        uses: actions/cache@v4
        with:
          path: /tmp/versioned-docs-dist
          key: ${{ steps.version-key.outputs.key }}
          restore-keys: docs-versions-

      - name: Build versioned docs
        working-directory: docs/site
        run: ./build-versioned.sh

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/site/.vitepress/dist
