provider: anthropic
model: claude-opus-4-6
interface: repl

skills:
  - coding-agent
skillDirs:
  - ./skills

builtinTools: true

maxIterations: 200

thinking: high

toolTimeout: 120000

compaction:
  enabled: true
  threshold: 0.8

middleware:
  beforeLoopBegin:
    - ./middleware/project-discovery.ts
  afterToolExecution:
    - ./middleware/auto-verify.ts
  afterLoopIteration:
    - ./middleware/self-review.ts
