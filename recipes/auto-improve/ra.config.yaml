agent:
  provider: anthropic
  model: claude-sonnet-4-6
  systemPrompt: Read /auto-improve and begin.
  permissions:
    no_rules_rules: true
  maxIterations: 500
  toolTimeout: 600000
  tools:
    builtin: true
    overrides:
      Agent:
        enabled: false
      WebFetch:
        enabled: false
  skillDirs:
    - ./skills
  middleware:
    beforeLoopBegin:
      - ./middleware/bench-context.ts
  compaction:
    enabled: true
    threshold: 0.8
