agent:
  provider: anthropic
  model: claude-sonnet-4-6
  systemPrompt: Read /auto-improve and begin.
  permissions:
    disabled: true
  maxIterations: 500
  thinking: high
  toolTimeout: 600000
  tools:
    builtin: true
    Agent:
      maxConcurrency: 4
      maxDepth: 2
    WebFetch:
      enabled: false
  skillDirs:
    - ./skills
  middleware:
    beforeLoopBegin:
      - ./middleware/bench-context.ts
    afterLoopIteration:
      - ./middleware/auto-save.ts
  compaction:
    enabled: true
    threshold: 0.8
