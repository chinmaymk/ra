# Example bench.yaml — copy to your working directory and customize.
#
# This file tells the auto-improve agent what to benchmark,
# what it can tune, and how to evaluate results.

# -------------------------------------------------------------------
# Benchmark execution
# -------------------------------------------------------------------

# Command to run the benchmark. Use $CONFIG to reference the config under test.
# The agent will copy the target config, modify it, and set CONFIG to the copy path.
run: ra --config $CONFIG --cli "solve the task" < tasks.jsonl

# How to extract the top-line score from stdout/stderr
score:
  pattern: "accuracy:\\s*([\\d.]+)"
  direction: higher   # "higher" or "lower"

# Per-case detailed results (optional, enables failure-level diagnosis)
results:
  file: results.json

# -------------------------------------------------------------------
# Degrees of freedom — what the agent is allowed to tune
# -------------------------------------------------------------------

# The ra config being optimized. The agent reads this, understands
# every knob, and proposes changes across all axes.
config: ./agent-under-test.config.yaml

# Source code directories that can be modified (tool implementations,
# middleware, providers, etc). Optional — omit to restrict to config-only.
code:
  - src/tools/
  - src/middleware/

# System prompt file, if extracted separately from the config.
# Optional — if omitted, the agent modifies systemPrompt inline in the config.
prompt: ./system-prompt.md

# Skill directories the agent can modify
skills:
  - ./skills/

# Pre-benchmark validation (optional)
validate: bun tsc && bun test
